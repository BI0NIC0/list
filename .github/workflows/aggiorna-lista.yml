name: Aggiorna lista unificata

on:
  workflow_dispatch:
  push:
    paths:
      - "sources.txt"
      - "merge_lists.py"
      - ".github/workflows/aggiorna-lista.yml"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: aggiorna-lista
  cancel-in-progress: false

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Genera la lista senza duplicati
        run: python merge_lists.py

      - name: Salva il risultato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lista.txt last-run.txt

          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi

          git commit -m "Aggiornamento automatico lista"
          git push
